<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffa818"/>
      <stop offset="0.5" stop-color="#ffdf70"/>
      <stop offset="1" stop-color="#fff6d0"/>
    </linearGradient>
    <radialGradient id="fire" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffc070"/>
      <stop offset="1" stop-color="#ff5a00"/>
    </radialGradient>
    <radialGradient id="ice" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#d8f2ff"/>
      <stop offset="1" stop-color="#2e8fff"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="13" fill="#070a16"/>
  <!-- 炎と氷（融合元） -->
  <circle cx="13" cy="44" r="6.5" fill="url(#fire)"/>
  <circle cx="21" cy="52" r="6.5" fill="url(#ice)"/>
  <!-- 融合の白光 -->
  <circle cx="17" cy="48" r="9" fill="#ffffff" opacity="0.28"/>
  <!-- 黄金の光の矢 -->
  <path d="M14 50 L41 31 L56 8 L33 23 Z" fill="url(#gold)"/>
  <path d="M18 46 L39 29 L53 11 L35 25 Z" fill="#ffffff" opacity="0.85"/>
  <!-- 先端の輝き -->
  <path d="M56 8 L46 12 M56 8 L52 18" stroke="#fff6d0" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
</svg>
